<!DOCTYPE html>
<html>

<head>

    <title>Request Blood</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body style="background:#120000;color:white;">

<div class="container">

    <div
        class="card p-5 mt-5"
        style="
            background:#1e1e1e;
            border-radius:20px;
            max-width:700px;
            margin:auto;
        "
    >

        <h2 class="text-center mb-4">

            Emergency Blood Request

        </h2>

        <form method="POST">

            <input
                type="text"
                name="patient_name"
                class="form-control mb-3"
                placeholder="Patient Name"
                required
            >

            <select
                name="blood_group"
                class="form-control mb-3"
                required
            >

                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>O+</option>
                <option>O-</option>
                <option>AB+</option>
                <option>AB-</option>

            </select>

            <input
                type="text"
                name="city"
                class="form-control mb-3"
                placeholder="City"
                required
            >

            <input
                type="text"
                name="hospital"
                class="form-control mb-3"
                placeholder="Hospital Name"
                required
            >

            <input
                type="text"
                name="contact"
                class="form-control mb-3"
                placeholder="Emergency Contact"
                required
            >

            <select
                name="urgency"
                class="form-control mb-4"
                required
            >

                <option>Critical</option>
                <option>High</option>
                <option>Normal</option>

            </select>

            <button class="btn btn-danger w-100">

                Send Emergency Request

            </button>

            <div class="text-center mt-4">

             <a
               href="/dashboard"
             class="btn btn-light px-4"
    >

        ← Back To Dashboard

         </a>

         </div>

        </form>

    </div>

</div>

</body>
</html>
