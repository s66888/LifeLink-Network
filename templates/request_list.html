<!DOCTYPE html>
<html>

<head>

    <title>Emergency Requests</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{

            background:linear-gradient(
                135deg,
                #120000,
                #1b0000,
                #240000
            );

            color:white;

            min-height:100vh;
        }

        .main-card{

            background:#1e1e1e;

            border-radius:25px;

            padding:40px;

            margin-top:50px;

            box-shadow:0 0 30px rgba(255,0,0,0.15);
        }

        .title{

            text-align:center;

            font-size:42px;

            font-weight:bold;

            color:#ff4d4d;

            margin-bottom:50px;
        }

        .request-card{

            background:#2a2a2a;

            border-radius:20px;

            padding:25px;

            transition:0.3s;

            height:100%;
        }

        .request-card:hover{

            transform:translateY(-5px);

            box-shadow:0 0 20px rgba(255,0,0,0.2);
        }

        .blood-group{

            font-size:45px;

            font-weight:bold;

            color:#ff4d4d;
        }

        .patient-name{

            font-size:24px;

            font-weight:bold;

            margin-top:15px;
        }

        .info{

            color:#cccccc;

            margin-top:8px;
        }

        .urgency{

            display:inline-block;

            margin-top:15px;

            padding:8px 18px;

            border-radius:20px;

            font-size:14px;

            font-weight:bold;
        }

        .critical{

            background:#dc3545;
        }

        .high{

            background:#fd7e14;
        }

        .normal{

            background:#198754;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="title">

            Emergency Blood Requests

        </div>

        <div class="row g-4">

            {% for request in requests %}

            <div class="col-md-4">

                <div class="request-card">

                    <div class="blood-group">

                        {{ request[2] }}

                    </div>

                    <div class="patient-name">

                        {{ request[1] }}

                    </div>

                    <div class="info">

                        🏥 {{ request[4] }}

                    </div>

                    <div class="info">

                        📍 {{ request[3] }}

                    </div>

                    <div class="info">

                        📞 {{ request[5] }}

                    </div>

                    <span class="
                        urgency
                        {% if request[6] == 'Critical' %}
                            critical
                        {% elif request[6] == 'High' %}
                            high
                        {% else %}
                            normal
                        {% endif %}
                    ">

                        {{ request[6] }}

                    </span>

                </div>

            </div>

            {% endfor %}

        </div>

        <div class="text-center mt-5">

            <a
                href="/dashboard"
                class="btn btn-light px-5 py-3"
            >

                ← Back To Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
