<!DOCTYPE html>
<html>

<head>

    <title>Blood Requests</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body style="background:#111;color:white;">

<div class="container mt-5">

    <h1 class="mb-4">

        Emergency Blood Requests

    </h1>

    <table class="table table-dark table-bordered">

        <thead>

            <tr>

                <th>ID</th>
                <th>Patient</th>
                <th>Blood Group</th>
                <th>City</th>
                <th>Hospital</th>
                <th>Contact</th>
                <th>Urgency</th>

            </tr>

        </thead>

        <tbody>

            {% for request in requests %}

            <tr>

                <td>{{ request[0] }}</td>
                <td>{{ request[1] }}</td>
                <td>{{ request[2] }}</td>
                <td>{{ request[3] }}</td>
                <td>{{ request[4] }}</td>
                <td>{{ request[5] }}</td>
                <td>{{ request[6] }}</td>

            </tr>

            {% endfor %}

        </tbody>
        <div class="text-center mt-4">

        <a
        href="/dashboard"
        class="btn btn-light px-4"
         >

        ← Back To Dashboard

         </a>

        </div>

    </table>

</div>

</body>
</html>
