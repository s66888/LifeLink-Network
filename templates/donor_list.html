<!DOCTYPE html>
<html>

<head>

    <title>Blood Donors</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body style="background:#111;color:white;">

<div class="container mt-5">

    <h1 class="mb-4">

        Registered Blood Donors

    </h1>

    <table class="table table-dark table-bordered">

        <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Blood Group</th>
                <th>City</th>
                <th>Contact</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody>

            {% for donor in donors %}

            <tr>

                <td>{{ donor[0] }}</td>
                <td>{{ donor[1] }}</td>
                <td>{{ donor[2] }}</td>
                <td>{{ donor[3] }}</td>
                <td>{{ donor[4] }}</td>
                <td>{{ donor[5] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
