<!DOCTYPE html>
<html>

<head>

    <title>Blood Donors</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        body{

            background:linear-gradient(
                135deg,
                #120000,
                #1b0000,
                #240000
            );

            color:white;

            min-height:100vh;
        }

        .main-card{

            background:#1e1e1e;

            border-radius:25px;

            padding:40px;

            margin-top:50px;

            box-shadow:0 0 30px rgba(255,0,0,0.15);
        }

        .title{

            text-align:center;

            font-size:42px;

            font-weight:bold;

            margin-bottom:40px;

            color:#ff4d4d;
        }

        .search-box{

            background:#2a2a2a !important;

            border:none;

            color:white !important;

            padding:14px;

            border-radius:12px;
        }

        .search-box::placeholder{

            color:white !important;
        }

        .search-box:focus{

            background:#2a2a2a !important;

            color:white !important;

            box-shadow:none;

            border:1px solid #ff4d4d;
        }

        select.search-box option{

            background:#1e1e1e;

            color:white;
        }

        .donor-card{

            background:#2a2a2a;

            border-radius:20px;

            padding:25px;

            transition:0.3s;

            height:100%;
        }

        .donor-card:hover{

            transform:translateY(-6px);

            box-shadow:0 0 20px rgba(255,0,0,0.25);
        }

        .blood-group{

            font-size:45px;

            font-weight:bold;

            color:#ff4d4d;
        }

        .donor-name{

            font-size:24px;

            font-weight:bold;

            margin-top:15px;
        }

        .donor-info{

            color:#cccccc;

            margin-top:8px;
        }

        .status{

            display:inline-block;

            margin-top:15px;

            padding:8px 18px;

            border-radius:20px;

            font-weight:bold;

            font-size:14px;
        }

        .available{

            background:#198754;
        }

        .not-available{

            background:#dc3545;
        }

        .back-btn{

            border-radius:12px;

            padding:12px 25px;

            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="title">

            <i class="fa-solid fa-hand-holding-droplet"></i>

            Blood Donor Search

        </div>

        <!-- Search Form -->

        <form method="GET" class="row g-3 mb-5">

            <div class="col-md-5">

                <select
                    name="blood_group"
                    class="form-control search-box"
                >

                    <option value="">
                        Select Blood Group
                    </option>

                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>O+</option>
                    <option>O-</option>
                    <option>AB+</option>
                    <option>AB-</option>

                </select>

            </div>

            <div class="col-md-5">

                <input
                    type="text"
                    name="city"
                    class="form-control search-box"
                    placeholder="Enter City"
                >

            </div>

            <div class="col-md-2">

                <button class="btn btn-danger w-100 h-100">

                    Search

                </button>

            </div>

        </form>

        <!-- Donor Cards -->

        <div class="row g-4">

            {% for donor in donors %}

            <div class="col-md-4">

                <div class="donor-card">

                    <div class="blood-group">

                        {{ donor[2] }}

                    </div>

                    <div class="donor-name">

                        {{ donor[1] }}

                    </div>

                    <div class="donor-info">

                        📍 {{ donor[3] }}

                    </div>

                    <div class="donor-info">

                        📞 {{ donor[4] }}

                    </div>

                    <span class="
                        status
                        {% if donor[5] == 'Available' %}
                            available
                        {% else %}
                            not-available
                        {% endif %}
                    ">

                        {{ donor[5] }}

                    </span>

                </div>

            </div>

            {% endfor %}

        </div>

        <!-- Back Button -->

        <div class="text-center mt-5">

            <a
                href="/dashboard"
                class="btn btn-light back-btn"
            >

                ← Back To Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
