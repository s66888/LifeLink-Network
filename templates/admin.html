<!DOCTYPE html>
<html>

<head>

    <title>LifeLink Analytics</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{

            background:linear-gradient(
                135deg,
                #120000,
                #1b0000,
                #240000
            );

            color:white;

            min-height:100vh;
        }

        .main-card{

            background:#1e1e1e;

            border-radius:25px;

            padding:40px;

            margin-top:50px;

            box-shadow:0 0 30px rgba(255,0,0,0.15);
        }

        .title{

            text-align:center;

            font-size:42px;

            font-weight:bold;

            color:#ff4d4d;

            margin-bottom:50px;
        }

        .stat-card{

            background:#2a2a2a;

            border-radius:20px;

            padding:35px;

            text-align:center;

            transition:0.3s;
        }

        .stat-card:hover{

            transform:translateY(-5px);

            box-shadow:0 0 20px rgba(255,0,0,0.2);
        }

        .stat-number{

            font-size:55px;

            font-weight:bold;

            color:#ff4d4d;
        }

        .stat-title{

            font-size:22px;

            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="title">

            LifeLink Analytics Dashboard

        </div>

        <div class="row g-4">

            <!-- Total Donors -->

            <div class="col-md-4">

                <div class="stat-card">

                    <div class="stat-number">

                        {{ total_donors }}

                    </div>

                    <div class="stat-title">

                        Total Donors

                    </div>

                </div>

            </div>

            <!-- Available Donors -->

            <div class="col-md-4">

                <div class="stat-card">

                    <div class="stat-number">

                        {{ available_donors }}

                    </div>

                    <div class="stat-title">

                        Available Donors

                    </div>

                </div>

            </div>

            <!-- Blood Requests -->

            <div class="col-md-4">

                <div class="stat-card">

                    <div class="stat-number">

                        {{ total_requests }}

                    </div>

                    <div class="stat-title">

                        Emergency Requests

                    </div>

                </div>

            </div>

        </div>

        <div class="text-center mt-5">

            <a
                href="/dashboard"
                class="btn btn-light px-5 py-3"
            >

                ← Back To Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
