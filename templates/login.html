<!DOCTYPE html>
<html>

<head>

    <title>LifeLink Network - Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{

            background:linear-gradient(
                135deg,
                #120000,
                #1b0000,
                #240000
            );

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            color:white;
        }

        .card-box{

            width:420px;

            background:rgba(255,255,255,0.05);

            backdrop-filter:blur(15px);

            border-radius:25px;

            padding:40px;

            box-shadow:0 0 40px rgba(255,0,0,0.2);
        }

        .title{

            text-align:center;

            font-size:42px;

            font-weight:bold;

            color:#ff4d4d;

            margin-bottom:10px;
        }

        .subtitle{

            text-align:center;

            color:#cccccc;

            margin-bottom:35px;
        }

        .form-control{

    background:#2a2a2a !important;

    border:none;

    color:white !important;
        }

        .form-control::placeholder{

    color:#bdbdbd !important;
        }

        .form-control:focus{

    background:#2a2a2a !important;

    color:white !important;

    box-shadow:none;

    border:1px solid #ff4d4d;
        }

        select{

    color:white !important;
        }
  
        option{

    background:#1e1e1e;

    color:white;
        }

        .btn-login{

            background:linear-gradient(
                90deg,
                #ff1a1a,
                #ff4d4d
            );

            border:none;

            padding:14px;

            border-radius:12px;

            font-weight:bold;
        }

        a{

            color:#ff4d4d;

            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="card-box">

    <div class="title">

        LifeLink Network

    </div>

    <div class="subtitle">

        Emergency Blood Donation Platform

    </div>

    <form method="POST">

        <div class="mb-3">

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email"
                required
            >

        </div>

        <div class="mb-4">

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required
            >

        </div>

        <button class="btn btn-login w-100 text-white">

            Login

        </button>

    </form>

    <div class="text-center mt-4">

        Don't have account?

        <a href="/register">

            Register

        </a>

    </div>

</div>

</body>
</html>
