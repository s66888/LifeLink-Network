<!DOCTYPE html>
<html>

<head>

    <title>Add Blood Donor</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{

            background:linear-gradient(
                135deg,
                #120000,
                #1b0000,
                #240000
            );

            min-height:100vh;

            color:white;
        }

        .card-box{

            max-width:600px;

            margin:auto;

            margin-top:50px;

            background:#1e1e1e;

            padding:40px;

            border-radius:25px;

            box-shadow:0 0 30px rgba(255,0,0,0.15);
        }

        h2{

            font-weight:bold;

            margin-bottom:35px;
        }

        .form-control{

            background:#2a2a2a !important;

            border:none;

            color:white !important;

            padding:14px;

            border-radius:12px;
        }

        .form-control::placeholder{

            color:white !important;
            opacity:1;
        }
        input.form-control{

            font-weight:500;
        }

        .form-control:focus{

            background:#2a2a2a !important;

            color:white !important;

            box-shadow:none;

            border:1px solid #ff4d4d;
        }

        select.form-control{

            color:white !important;

            background:#2a2a2a !important;

            appearance:none;
        }

        select.form-control option{

            background:#1e1e1e !important;

            color:white !important;
        }

        .btn-danger{

            padding:14px;

            border-radius:12px;

            font-weight:bold;

            background:linear-gradient(
                90deg,
                #ff1a1a,
                #ff4d4d
            );

            border:none;

            transition:0.3s;
        }

        .btn-danger:hover{

            transform:scale(1.02);
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card-box">

        <h2 class="text-center">

            Add Blood Donor

        </h2>

        <form method="POST">

            <input
                type="text"
                name="fullname"
                class="form-control mb-3"
                placeholder="Full Name"
                required
            >

            <select
                name="blood_group"
                class="form-control mb-3"
                required
            >

                <option value="" disabled selected hidden>
                    Select Blood Group
                </option>

                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>

            </select>

            <input
                type="text"
                name="city"
                class="form-control mb-3"
                placeholder="City"
                required
            >

            <input
                type="text"
                name="contact"
                class="form-control mb-3"
                placeholder="Contact Number"
                required
            >

            <select
                name="availability"
                class="form-control mb-4"
                required
            >

                <option value="Available">
                    Available
                </option>

                <option value="Not Available">
                    Not Available
                </option>

            </select>

            <button class="btn btn-danger w-100">

                Save Donor

            </button>

        <div class="text-center mt-4">

           <a
        href="/dashboard"
        class="btn btn-light px-4"
         >

        ← Back To Dashboard

         </a>

        </div>
        

        </form>

    </div>

</div>

</body>
</html>
